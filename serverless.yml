service: cars-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs24.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'eu-west-1'}
  memorySize: 256
  timeout: 10
  tracing:
    lambda: true
  environment:
    POWERTOOLS_SERVICE_NAME: ${self:service}
    POWERTOOLS_METRICS_NAMESPACE: CarsService
    LOG_LEVEL: INFO
  httpApi:
    authorizers:
      carsApiAuthorizer:
        type: request
        functionName: apiAuthorizer
        identitySource:
          - $request.header.Authorization

plugins:
  - serverless-esbuild
  # After esbuild, scope the build dir as CJS (see scripts/serverless-lambda-cjs-scope.cjs).
  - ./scripts/serverless-lambda-cjs-scope.cjs

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node24
    platform: node
    # CJS so osls invoke local can require() the built handler (.mjs is not supported there).
    format: cjs

functions:
  api:
    handler: src/infrastructure/rest/api.handler
    events:
      - httpApi:
          authorizer: carsApiAuthorizer
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /health
          method: GET
  onCarSubmittedHandler:
    handler: src/infrastructure/events/on-car-submitted.handler
    events:
      - eventBridge:
          # Omit `eventBus` for the default bus. Setting `eventBus: default` makes osls emit a
          # Lambda Permission SourceArn `...:rule/default/<ruleName>`, which is invalid for the
          # default bus (correct ARN is `...:rule/<ruleName>`) and causes FailedInvocations.
          pattern:
            detail-type:
              - CarSubmitted
  apiAuthorizer:
    handler: src/infrastructure/rest/api-authorizer.handler
    role: !GetAtt apiAuthorizerRole.Arn
    environment:
      API_KEY_SECRET_ARN: !Ref carsApiKeySecret

resources:
  Resources:
    carsApiKeySecret:
      Type: AWS::SecretsManager::Secret
      Properties:
        Name: CarsServiceApiKey
        Description: API key for Cars Service
        GenerateSecretString:
          PasswordLength: 16
          ExcludePunctuation: true
    apiAuthorizerRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:provider.stage}-${self:service}-apiAuthorizer
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
          - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
        Policies:
          - PolicyName: CarsApiAuthorizerSecretsPolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - secretsmanager:GetSecretValue
                  Resource: !Ref carsApiKeySecret
